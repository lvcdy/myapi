<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- 强调色渐变 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- 闪电渐变 -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- 光晕 -->
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="256" height="256" fill="url(#bg)" rx="48"/>

  <!-- 内部光晕效果 -->
  <rect width="256" height="256" fill="url(#glow)" rx="48"/>

  <!-- 左尖括号 < -->
  <path d="M 52 128 L 92 88 L 92 102 L 66 128 L 92 154 L 92 168 Z"
        fill="url(#accent)" opacity="0.9"/>

  <!-- 右尖括号 > -->
  <path d="M 204 128 L 164 88 L 164 102 L 190 128 L 164 154 L 164 168 Z"
        fill="url(#accent)" opacity="0.9"/>

  <!-- 中央闪电 ⚡ -->
  <path d="M 140 72 L 112 132 L 132 132 L 116 184 L 152 118 L 130 118 Z"
        fill="url(#bolt)"/>

  <!-- 底部小点装饰 -->
  <circle cx="104" cy="210" r="5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="128" cy="210" r="5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="152" cy="210" r="5" fill="#06b6d4" opacity="0.5"/>

  <!-- 细边框 -->
  <rect width="256" height="256" fill="none" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="2" rx="48"/>
</svg>
