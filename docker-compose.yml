services:
  myapi:
    image: myapi:latest
    container_name: myapi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - myapi-network

networks:
  myapi-network:
